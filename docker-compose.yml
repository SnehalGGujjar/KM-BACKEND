version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kabadiman
      POSTGRES_USER: kabadi
      POSTGRES_PASSWORD: kabadi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
