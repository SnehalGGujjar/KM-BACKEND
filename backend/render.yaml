services:
  - type: web
    name: kabadiman-api
    env: python
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn kabadiman.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - fromGroup: kabadiman-env

  - type: worker
    name: kabadiman-celery
    env: python
    buildCommand: pip install -r requirements/prod.txt
    startCommand: celery -A kabadiman worker -l info
    envVars:
      - fromGroup: kabadiman-env

databases:
  - name: kabadiman-db
    databaseName: kabadiman
    user: kabadi

envVarGroups:
  - name: kabadiman-env
